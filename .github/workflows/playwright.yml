name: QA Senior Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install dependencies
      run: npm install
      
    - name: Create env file dynamically
      run: |
        echo "BASE_URL_API=https://jsonplaceholder.typicode.com" >> .env
        echo "BASE_URL_UI=https://www.saucedemo.com" >> .env
        echo "MOCK_URL_ERRORS=https://httpbin.org/status" >> .env
        echo "USER_UI=standard_user" >> .env
        echo "PASSWORD_UI=secret_sauce" >> .env

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npx playwright test
      
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30