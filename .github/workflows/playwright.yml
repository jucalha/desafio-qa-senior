name: QA Senior Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ----------------------------------------------------
  # JOB 1: TESTES FUNCIONAIS (API + UI Web)
  # ----------------------------------------------------
  functional-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install dependencies
      run: npm install
      
    - name: Create env file dynamically
      run: |
        echo "BASE_URL_API=https://jsonplaceholder.typicode.com" >> .env
        echo "BASE_URL_UI=https://www.saucedemo.com" >> .env
        echo "MOCK_URL_ERRORS=https://httpbin.org/status" >> .env
        echo "USER_UI=standard_user" >> .env
        echo "PASSWORD_UI=secret_sauce" >> .env

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npx playwright test
      
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  # ----------------------------------------------------
  # JOB 2: TESTES DE CARGA (k6) - RODANDO EM PARALELO
  # ----------------------------------------------------
  performance-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup k6
      uses: grafana/setup-k6-action@v1

    - name: Run k6 Performance Test
      run: k6 run k6/performance.js
      env:
        BASE_URL_API: https://jsonplaceholder.typicode.com